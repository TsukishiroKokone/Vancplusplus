name: Build VanBot

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  VCPKG_REF: 2024.12.16

jobs:
  build-linux:
    name: Linux ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            pkg-config \
            curl \
            zip \
            unzip \
            tar \
            git

      - name: 📦 Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout $VCPKG_REF
          ./bootstrap-vcpkg.sh
          ./vcpkg install --triplet x64-linux

      - name: 🔧 Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux

      - name: 🏗️ Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanbot-linux-${{ matrix.compiler }}
          path: build/vanbot
          if-no-files-found: error
          retention-days: 30

  build-windows:
    name: Windows MSVC
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout $env:VCPKG_REF
          .\bootstrap-vcpkg.bat
          .\vcpkg install --triplet x64-windows-static

      - name: 🔧 Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: 🏗️ Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanbot-windows-msvc
          path: |
            build/vanbot.exe
            build/Release/vanbot.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Nightly Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download Linux GCC
        uses: actions/download-artifact@v4
        with:
          name: vanbot-linux-gcc
          path: release/linux-gcc

      - name: 📥 Download Linux Clang
        uses: actions/download-artifact@v4
        with:
          name: vanbot-linux-clang
          path: release/linux-clang

      - name: 📥 Download Windows MSVC
        uses: actions/download-artifact@v4
        with:
          name: vanbot-windows-msvc
          path: release/windows

      - name: 📦 Package
        shell: bash
        run: |
          set -e
          chmod +x release/linux-gcc/vanbot
          chmod +x release/linux-clang/vanbot
          cp release/linux-gcc/vanbot release/vanbot-linux-gcc
          cp release/linux-clang/vanbot release/vanbot-linux-clang
          if [ -f release/windows/vanbot.exe ]; then
            cp release/windows/vanbot.exe release/vanbot-windows.exe
          else
            cp release/windows/Release/vanbot.exe release/vanbot-windows.exe
          fi
          ls -la release

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.0-nightly
          name: VanBot v3.0.0 Nightly Build
          body: |
            🌸 VanBot v3.0.0 - 高性能 C++ QQ 关键词词库机器人
            多适配器 · 嵌套变量 · 可爱系TUI
          files: |
            release/vanbot-linux-gcc
            release/vanbot-linux-clang
            release/vanbot-windows.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
