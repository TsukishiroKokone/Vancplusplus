name: Build VanBot

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    name: Linux ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: 5e5d0e1c9f1ef4bdb3dbe3cfd22b3c6f0a1f4f29

      - name: 🔧 Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config curl zip unzip tar

      - name: 🔧 Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: 🏗️ Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanbot-linux-${{ matrix.compiler }}
          path: |
            build/vanbot
            build/vanbot.exe
          if-no-files-found: error
          retention-days: 30

  build-windows:
    name: Windows MSVC
    runs-on: windows-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: 5e5d0e1c9f1ef4bdb3dbe3cfd22b3c6f0a1f4f29

      - name: 🔧 Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: 🏗️ Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vanbot-windows-msvc
          path: |
            build/vanbot.exe
            build/${{ env.BUILD_TYPE }}/vanbot.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Nightly Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📥 Download Linux GCC
        uses: actions/download-artifact@v4
        with:
          name: vanbot-linux-gcc
          path: release/linux-gcc

      - name: 📥 Download Linux Clang
        uses: actions/download-artifact@v4
        with:
          name: vanbot-linux-clang
          path: release/linux-clang

      - name: 📥 Download Windows MSVC
        uses: actions/download-artifact@v4
        with:
          name: vanbot-windows-msvc
          path: release/windows

      - name: 📦 Package
        shell: bash
        run: |
          set -e
          if [ -f release/linux-gcc/vanbot ]; then
            chmod +x release/linux-gcc/vanbot
            cp release/linux-gcc/vanbot release/vanbot-linux-gcc
          fi
          if [ -f release/linux-clang/vanbot ]; then
            chmod +x release/linux-clang/vanbot
            cp release/linux-clang/vanbot release/vanbot-linux-clang
          fi
          if [ -f release/windows/vanbot.exe ]; then
            cp release/windows/vanbot.exe release/vanbot-windows.exe
          elif [ -f release/windows/Release/vanbot.exe ]; then
            cp release/windows/Release/vanbot.exe release/vanbot-windows.exe
          fi
          ls -la release

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.0-nightly
          name: VanBot v3.0.0 Nightly Build
          body: |
            🌸 VanBot v3.0.0 - 高性能 C++ QQ 关键词词库机器人
            多适配器 · 嵌套变量 · 可爱系TUI

            ## 下载
            - `vanbot-linux-gcc` - Linux GCC 编译版本
            - `vanbot-linux-clang` - Linux Clang 编译版本
            - `vanbot-windows.exe` - Windows MSVC 编译版本

            ## 使用
            ```bash
            # Linux - 单适配器
            chmod +x vanbot-linux-gcc
            ./vanbot-linux-gcc --ws ws://127.0.0.1:6700

            # 多适配器
            ./vanbot-linux-gcc \
              --add-adapter bot1 forward ws://localhost:6700 \
              --add-adapter bot2 reverse 9800 \
              --add-adapter bot3 milky ws://localhost:8765

            # Windows
            vanbot-windows.exe --ws ws://127.0.0.1:6700
            ```
          files: |
            release/vanbot-linux-gcc
            release/vanbot-linux-clang
            release/vanbot-windows.exe
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
